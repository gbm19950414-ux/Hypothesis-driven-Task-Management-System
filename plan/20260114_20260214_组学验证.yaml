plan:
  # 量级判断问题：
    # Plan
      # 风险：是否值得投入一段人生时间
      # 是否允许错误：❌（错了要尽快止损）
    # Hypothesis
      # 风险：因果判断是否成立
      # 是否允许错误：⚠️（视主导哲学）
    # Step
      # 风险：路径是否可行
      # 是否允许错误：✅（可绕、可换）
    # Task
      # 风险：今天是否留下证据
      # 是否允许错误：✅（错也无所谓）

  # 你在定义一个东西时，问自己：“如果它失败了，我最应该后悔的是哪一层？”
    # 后悔不该做这件事 → Plan
    # 后悔当初判断错了 → Hypothesis
    # 后悔路径选得不好 → Step
    # 后悔今天效率不高 → Task

  # philosophy 决定“成败由谁裁决”
    # 选择规则（只选一个）：
    # - target：当你不知道路径，但需要方向与动机（探索 / 创新阶段）
    # - evidence：当走错路成本很高，需要尽快证伪假设（科研 / 决策验证）
    # - constraint：当时间或资源刚性，必须按期交付（截止期驱动）
  
  # 换挡原则：
    # - 不知道去哪 → target
      # [target 主导填写规则]
      # - desired_state：必须清晰、具体、可感知（最重要）
      # - hypotheses：可以模糊，只需保证“方向合理”
      # - validation：只做方向性校验，不设过硬阈值
      # - current_state：只写关键摩擦，避免过度悲观
      # - constraints：存在即可，不作为裁决标准
    # - 害怕走错 → evidence
      # [evidence 主导填写规则]
      # - hypotheses：必须可证伪（核心）
      # - validation.stop_rule：必须明确（出现即停）
      # - desired_state：可以抽象，重点是“学到什么 / 排除什么”
      # - current_state：重点写不确定性来源
      # - constraints：用于限制沉没成本，不用于裁决成败
    # - 来不及了 → constraint
      # [constraint 主导填写规则]
      # - constraints.deadline_or_budget：最高裁决权（最重要）
      # - desired_state：必须被约束裁剪成“可交付版本”
      # - hypotheses：增加假设的确定性，从“科学实验->预期结果”，降级为“行动->可交付结果”，不追求完美
      # - validation：以“到点是否可用”为主
      # - current_state：重点写资源缺口，而非理论不确定性
      
  # 填写权重说明（结构不变，权重变化）
    # target 主导：
      # - 重视：desired_state
      # - 允许弱化：hypotheses / validation
      # - 成败标准：方向是否更清晰
    # evidence 主导：
      # - 重视：hypotheses / validation.stop_rule
      # - 允许弱化：desired_state 的具体形态
      # - 成败标准：假设是否被证伪或支持
    # constraint 主导：
      # - 重视：constraints.deadline_or_budget
      # - 允许弱化：hypotheses 的完美性
      # - 成败标准：是否按期交付
  philosophy: constraint   # 只能选一个作为主导

  desired_state:
    time_window: "4week"        # 如: 4 weeks / by 2026-02-01
    observable_change: "机制验证部分正文（中文论文）"  # 必须可被第三方判断（↑ ↓ 出现 消失）

  current_state:
    hard_constraints: "time"   # 时间 / 资源 / 权限
    failure_mode: "超时"       # 最可能怎么失败
    uncertainty: "实验结果是否符合预期"        # 最大不确定来源

  validation:
    earliest_signal: ""    # 最早判断对/错的信号
    stop_rule: ""          # 出现即停（必填）

  constraints:
    deadline_or_budget: "2026-02-14"
    fallback_rule: "freeze_output_and_reallocate_time"

  hypotheses:              # ≤ 3 条，
    - action: "完善组学数据分析，锁定关键机制"
      id: H1
      expected_effect: "获得验证实验计划"
      time_to_observe: "2026-01-16"
      falsified_if: ""
    - action: "根据实验计划，执行实验数据收集"
      id: H2
      expected_effect: "获得验证实验结果，并以论文正文形式呈现"
      time_to_observe: "2026-02-13"
      falsified_if: ""

  steps:
  - id: S1
    description: "让组学结论更可靠"
    supports_hypothesis: H1
    done_if: "获得在当前理解下优化过一次的组学结论"
    output: "优化后的中文正文组学部分"
    status: done
  - id: S2
    description: "根据组学结论提出假设与实验验证计划"
    supports_hypothesis: H1
    done_if: "在规定时间内获得一份可实施的实验计划"
    output: "验证实验计划"
    status: done

  - id: S3
    description: "冻结用于执行的实验方案版本"
    supports_hypothesis: H2
    done_if: "存在一份标注为 final 的实验方案，包含关键参数与对照"
    output: "最终实验方案（执行版）"
    status: active
    
  - id: S4
    description: "完成实验执行并获得完整原始数据"
    supports_hypothesis: H2
    done_if: "所有计划实验均执行完成，且原始数据完整保存"
    output: "原始实验数据（含元信息）"
    status: todo
  - id: S5
    description: "将原始实验数据转化为可解释的分析结果"
    supports_hypothesis: H2
    done_if: "至少生成一组可用于结论判断的分析结果（图/表）"
    output: "分析结果图表"
    status: todo
  - id: S6
    description: "将实验结果转化为论文正文中的结果描述"
    supports_hypothesis: H2
    done_if: "结果以符合论文风格的文本与图注形式写入正文"
    output: "论文正文实验结果段落"
    status: todo
  tasks:
    # 任务层的唯一职责：一天内留下“可冻结的执行证据”，推动某个 Step 前进。
      # - Task 必须挂靠一个 supports_step（否则就是噪音/拖延）
      # - Task 必须有 output（否则等于没做）
      # - done_if 是最低验收线：满足即可冻结，不追求完美
      # - due: 只用于排布节奏（今天/某日/某区间），不作为成败标准
      # - 一个 Task 做不完：拆分或降级 done_if；不要把压力上推到 Step/Hypothesis
      #
    # 常用拆分模板（每个 Step 通常由 1-3 个 Task 推进）：
      # 1) 准备/定义（freeze 标准、收集输入）→ 2) 产出（生成 output）→ 3) 轻量 QC（确保可用并冻结）
      #
    # Task 最小字段（MVP）：
      # - id / supports_step / description / output / done_if
    # 可选字段：
      # - due: "YYYY-MM-DD" 或 "today" 或 "2026-01-15~2026-01-16"
      # - timebox: "2h"（仅用于防止任务膨胀，不用于评判）
      #
    # ---- 任务清单（你自己填写 description/output/done_if/due/timebox） ----
    - id: T1
      supports_step: S1
      description: "基于既有数据，对当前组学结论进行一次完整再分析/再整理"
      output: "pdf、r、yaml文件"
      done_if: "分析整个流程都代表了目前对课题的最高理解、正确性"
      due: "2026-01-15"
      done: "2026-01-16"
      timebox: "1day"
      status: done

    - id: T2
      supports_step: S1
      description: "根据最新yaml文件，将新的组学结论以备注形式更新到中文正文草稿中"
      output: "docx文件"
      done_if: "论文准确表达最新观点，并具有可读性。过程中理解整个流程"
      due: "2026-01-15"
      timebox: "4h"
      status: freeze

    - id: T3
      supports_step: S2
      description: 
        首先明确组学结论得出的整体逻辑与方法：是否需要返回到基因集设定，考虑capacity、footprint，的出合理假设，验证方向？
        基于当前组学结论，形成一个有限的候选机制假设
      output: "机制假设.yaml"
      done_if: "文件存在，且包含2个机制均附带支持证据与主要不确定点"
      due: "2026-01-16"
      timebox: "4h"
      status: done

    - id: T4
      supports_step: S2
      description: "将优先级最高的候选机制翻译为可执行的实验验证方案（初版）"
      output: "实验方案.yaml"
      done_if: "文件存在，且实验方案明确包含操纵对象、读出指标和关键对照"
      due: "2026-01-16"
      timebox: ""
      status: done

    # ---- S3：冻结用于执行的实验方案版本 ----
    - id: T5
      supports_step: S3
      description: "将实验方案（初版）转为可执行的 final 版本：锁定关键参数、对照与样本数（不追求完美）"
      output: "experiment/S3_exec_plan_final.yaml"
      done_if: "文件存在，且明确写出关键参数/对照/样本数；并标注版本为 final"
      due: "2026-01-19"
      timebox: "4h"
      status: done
    - id: T6
      supports_step: S3
      description: "为 final 执行版生成执行清单：试剂/耗材/样本准备、设备预约、时间线与风险点"
      output: "experiment/S3_exec_checklist.md"
      done_if: "文件存在，且包含试剂耗材清单、设备/时间安排、≥2 个风险点与应对"
      due: "2026-01-19"
      timebox: "2h"
      status: active
    # ---- S4：完成实验执行并获得完整原始数据 ----
    - id: T7
      supports_step: S4
      description: "按执行版完成首批实验"
      output: "raw_data/S4_batch1/"
      done_if: "文件夹存在且包含原始数据"
      due: "2026-01-20~2026-01-23"
      timebox: ""
      status: todo
    - id: T8
      supports_step: S4
      description: "完成剩余2批次实验并合并整理原始数据"
      output: "raw_data/S4_manifest.md"
      done_if: "实验原始数据文件存在"
      due: "2026-01-23~2026-02-09"
      timebox: ""
      status: freeze
    # ---- S5：将原始实验数据转化为可解释的分析结果 ----
    - id: T9
      supports_step: S5
      description: "将数据放入分析入口并完成一次端到端跑通：读入→基础QC→输出初版结果（可以粗糙）"
      output: "yaml，pdf"
      done_if: "脚本存在且可运行；能读入全部数据并输出至少1个QC汇总与1个结果图/表"
      due: "2026-02-10"
      timebox: "1day"
      status: todo

    - id: T10
      supports_step: S5
      description: "生成主要结果图表"
      output: ""
      done_if: "可上图级别结果图表"
      due: "2026-02-11"
      timebox: ""
      status: todo

    # ---- S6：将实验结果转化为论文正文中的结果描述 ----
    - id: T11
      supports_step: S6
      description: "撰写结果段落，根据yaml稳健把图表与结论写成可读的正文叙述"
      output: ""
      done_if: "docx 存在结果叙述 + 对应图表引用"
      due: "2026-02-12"
      timebox: "1day"
      status: todo

    - id: T12
      supports_step: S6
      description: "优化论文结构"
      output: "manuscript/S6_figure_captions.md"
      done_if: "文件存在，且具有较高可读性"
      due: "2026-02-13"
      timebox: "4h"
      status: todo
      
procedure:
  - id: P1
    supports_task: T1
    focus: "确定组学章节主叙事与判准（这章要证明什么、关键节点是什么）"
    done_if: "由于一开始的logical.yaml可能有问题，所以要首先与gpt讨论，获得正确的逻辑"
    artifacts: [logical.yaml]
    record: 
      由于中介分析太不稳定，选择进行机制匹配分析
      完成逻辑梳理
    status: done

  - id: P2
    supports_task: T1
    focus: "扫描所有步骤的合理性，能否为接下来的目的服务,若不能，想办法修正"
    done_if: "完成所有panel与panel.yaml的重塑"
    artifacts: ["scan_notes.md"]
    record:
      完成panel的重塑，但是还没有对panel.yaml重塑，
      重塑yaml的过程本质上等于下一个任务中的撰写正文 和 理解整个流程，所以留到下一个任务一起处理
    status: done

  - id: P3
    supports_task: T2
    focus: "pdf文件"
    done_if: "所有pdf文件达到上图标准"
    artifacts: ["figure5/6.ai"]
    record:
      首先逻辑要正确，首先看逻辑
    status: done

  - id: P4
    supports_task: T2
    focus: "yaml文件"
    done_if: "所有说明yaml文件符合pdf文件传达意义"
    artifacts: ["figure5/6.yaml"]
    record:

    status: done

  - id: P5
    supports_task: T2
    focus: "doc文件"
    done_if: "doc中的中文论文（最终说明）清晰传达yaml说明文件的内在含义"
    artifacts: ["毕业论文最新版本.docx"]
    record:
      等待孙老师返回结果后再进行修改
    status: todo

  - id: P6
    supports_task: T3
    focus: "利用 AI 扩展可能的机制候选空间（不裁决）"
    done_if: "列出 ≥3 个与当前组学结果一致的候选机制，每个附 1–2 条支持线索"
    artifacts: ["mechanism_candidates_raw.md"]
    status: done

  - id: P7
    supports_task: T3
    focus: "基于自身理解与可验证性，对候选机制进行筛选与收敛"
    done_if: "最终 mechanism.yaml 中保留 2 个机制，均标注支持证据与主要不确定点"
    artifacts: ["mechanism.yaml"]
    status: done
    record: 
      优化假设结构，确定精细度

  - id: P8
    supports_task: T3
    focus: "与孙老师讨论，获得最终裁判与资源"
    done_if: "完成讨论，开始资源准备、方法建立与样品收集"
    artifacts: ["mechanism.yaml"]
    status: freeze
    record: 
      优化假设结构，确定精细度

  - id: P9
    supports_task: T4
    focus: "根据假设与验证逻辑，获得可以实际执行的实验方案"
    done_if: "获得可执行的实验方案"
    artifacts: ["实验方案.yaml"]
    status: done
    record: >
      已经由假设生成了pipeline
      pipeline生成了具体执行方案
      接下来只需要准备好meterial和protocol就可以开始实验

