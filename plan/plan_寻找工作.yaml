# plan_init_checklist.yaml
# 用途：新建任何计划前的“初始化清单”
# 目标：在 10–15 分钟内，明确裁决逻辑与运作模式，避免写出四不像计划

  # =========================
  # 1) 目标与现状
  # =========================
desired_state:
  statement: "找到一份满意的工作"           # 期望的“不同于现在”的状态（可模糊，但要有方向性）
  observable_signal: "获得工作邀请邮件"   # 第三方可判断的变化（出现/消失/↑↓）

current_state:
  facts: "目前没有很好的观念，对于什么是满意的工作没有概念，同时时间仅剩3个月"               # 关键事实（资源/能力/限制）
  bottlenecks: "时间、缺乏明确目标"         # 主要卡点
  uncertainty: "明确目标"         # 最大不确定来源
  risk_if_wrong: "浪费数年在无效工作上"       # 走错路的代价

# =========================
# 2) 选择计划哲学（裁决标准）
# =========================
philosophy:
  primary: "constraint"             # target | evidence | constraint（选一个主导）
  reason: "在当前认知下，做出最合理的工作选择"              # 为什么选它？
  failure_definition: "未在3个月内完成工作寻找，尽量获得工作邀请邮件"  # 什么算失败？（未达目标/被证伪/未按时）

# =========================
# 3) 选择任务生成器（运作模式）
# =========================
generator:
  type: "execution"                # change(PHST) | execute(Execution) | maintain(Ops)
  reason: "需要在3个月内完成工作寻找，因此需要低不确定性，在约束状态下确保产出"              # 为什么选这个？
  expected_cadence: "每天执行任务"    # 节律：低频变革 / 高频执行 / 周期维护

# =========================
# 4) 行动假设（Action -> Effect）
# =========================
hypothesis:
  action: "按照步骤进行，完成工作寻找"              # 我将做什么？
  expected_effect: "每周完成至少 1 个关键任务，逐步推进工作寻找准备"     # 预期会观察到什么变化/证据/结果？
  scope_limit: "仅验证是否能按计划推进工作寻找准备"         # 本轮只验证什么？不验证什么？

# =========================
# 5) 校验机制（Validation / Stop Rule）
# =========================
validation:
  success_signal: "按时完成指定任务"      # 看到什么算“方向对/成立”？
  falsified_if: "任务延迟完成"        # 出现什么算“失败/被证伪/应停止”？
  review_point: "每周五下午 5 点"        # 何时检查？（日期/周次/里程碑）

# =========================
# 6) 约束（Time / Resource Box）
# =========================
constraints:
  time_box: "3 months"            # 如: "2 weeks" / "by 2026-03-15"
  resource_budget: ""     # 时间/精力/金钱/并行度
  must_not_do: ""         # 明确禁止/暂不做的事
  fallback_rule: ""  # 失败时的默认回退策略
execution_plan:
name: "寻找工作"
time_window: "2026-02-26~2026-05-26"
objective:
  - id: o1
    due: "2026-03-09"      
    description: "明确行业，岗位等目标细节及需求"
    done_if: "获得行业调研表"
    status: done

  - id: o2
    due: "2026-03-09"      
    depends_on: [o1]
    description: "明确自身职业发展相关三观具体内容"
    done_if: "获得自我评估表"
    status: done
  - id: o3
    due: "2026-03-10"      
    depends_on: [o1, o2]
    description: "综合自我评估表与行业调研表，获得目标岗位列表"
    done_if: "获得目标岗位列表"
    status: done
  - id: o4
    due: "2026-03-11"      
    depends_on: [o3]
    description: "根据目标岗位，设计针对性的求职行动方案"
    done_if: "获得求职行动方案"
    status: done
  - id: o5
    due: "2026-03-12"      
    depends_on: [o4]
    description: "根据求职行动方案，准备简历与求职材料"
    done_if: "获得简历"
    status: done
  - id: o6
    due: "2026-03-13"      
    depends_on: [o5]
    description: "投递简历，准备面试，并进行面试，直至获得offer"
    done_if: "获得工作offer"
    status: todo
tasks:
  - id: T1
    objective_id: o1
    condition: ""
    description: "定义求职对齐维度：确定用于评估就业方向的字段（如工作内容、技能要求、门槛、发展路径、薪资区间、节奏、地域、风险等），并产出模板文件"
    status: done

  - id: T2
    objective_id: o1
    depends_on: [T1]
    description: "列出 3–5 个主要就业方向清单，并将其作为调研对象填入模板"
    status: done

  - id: T3
    objective_id: o1
    depends_on: [T2]
    description: "为每个就业方向采集至少 2 个岗位 JD，并按模板字段填入调研表（形成行业调研表 v0.1）"
    status: done

  - id: T4
    objective_id: o2
    due: "2026-03-04"
    description: "定义自我评估维度与结构（能力/经验/偏好/价值取向/约束），并产出自我评估模板文件"
    status: done

  - id: T5
    objective_id: o2
    depends_on: [T4]
    description: "填写自我评估模板中的事实项（经历、技能、限制条件等），形成自我评估表 v0.1"
    status: done

  - id: T6
    objective_id: o2
    depends_on: [T4]
    description: "建立『三观持续提升』项目计划（世界观/价值观/职业选择），并定义可执行与可复盘机制"
    output:
      - "project_worldview_values_career_v1.yaml"
      - "原则与阅读/学习清单（附来源与版本号）"
      - "首轮 4 周行动清单（每周可冻结产出）"
    done_if: >
      1) 已创建并提交 project_worldview_values_career_v1.yaml；
      2) 计划中至少包含 3 个 Steps（世界观/价值观/职业选择），每个 Step ≥5 个 Tasks；
      3) 世界观部分：包含『了解真实历史』的学习路径与至少 5 个可信来源（书/课程/档案/史料）；
      4) 价值观部分：已写入两条核心原则（不替他人规划人生；人生是等价交换与责任边界），并各自配套 2–3 个可执行练习或反思任务；
      5) 职业选择部分：已给出一个可复盘的决策框架（输入/权重/约束/输出）与 3 个验证性任务；
      6) 计划中所有 Tasks 均有 output / done_if / timebox。
    record: >
      - 建立过程的设计决策记录（为何这样分 Steps / 取舍了什么）
      - 关键参考资料清单与链接
      - 首次执行一周后的回顾要点（是否可执行/是否过载/需要删减的字段）
      
      任何人都不能也没有能力给其他人的人生作出规划，因为人生轨迹是初始条件与基于个人价值观的选择共同塑造的，而这一过程是独特、无法复制的。建议只应当停留在个人价值观的塑造上，以帮助他人更好地了解自己，做出的下一个选择更正确。
      人生是等价交换，通过选择承担一部分责任，来获得一部分好处，过多的责任会耗尽人的精力，不再有情绪照顾他人感受、完善自己的工作质量。掌握好自己的斤两，承担适度的责任，让自己能用最佳的精力完成，获得适当的报酬，可持续地循环。
    timebox: "3h"
    status: suspend
  - id: T7
    objective_id: o5
    description: "约谈理涯王老师，再次检阅简历"
    record:
      添加王君老师微信——doing
