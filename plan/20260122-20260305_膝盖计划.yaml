plan:
  # =========================
  # 0. 元认知注释（只读）
  # =========================

  # 量级判断问题：
  # - Plan：是否值得投入一段人生时间（错了要尽快止损）
  # - Hypothesis：因果判断是否成立（是否允许被证伪）
  # - Step：路径是否可行（允许绕路 / 替换）
  # - Task：今天是否留下证据（错了也没关系）

  # philosophy 决定“成败由谁裁决”
  # 只能选一个作为主导，其余降级为辅助
  philosophy: target | evidence | constraint

  # =========================
  # 1. 目标与现状
  # =========================

  desired_state:
    time_window: ""        # 如: "4 weeks" / "by 2026-02-01"
    observable_change: "膝关节问题好转"  # 第三方可判断的变化（出现 / 消失 / ↑ ↓）

  current_state:
    hard_constraints: "每周2次训练机会"   # 时间 / 资源 / 权限
    failure_mode: "训练效果不好，导致问题未解决或恶化"       # 最可能的失败方式
    uncertainty: "训练安排质量"        # 最大不确定来源

  # =========================
  # 2. 校验与约束
  # =========================

  validation:
    earliest_signal: ""    # 最早能判断方向对/错的信号
    stop_rule: ""          # 出现即停（必填，尤其在 evidence 主导下）

  constraints:
    deadline_or_budget: "" # YYYY-MM-DD / 预算描述
    fallback_rule: "freeze_output_and_reallocate_time"

  # =========================
  # 3. 假设层（≤ 3）
  # =========================

  hypotheses:
    - id: H1
      action: >
        通过训练参数与动作窗口的系统性调节，
        而非完全休息或医疗介入，
        可以在有限时间内解决当前膝关节问题
      expected_effect: >
        在4–6周内，
        膝前疼痛频率与强度下降，
        且不出现结构性恶化信号
      falsified_if: >
        在训练负荷被严格控制的前提下，
        疼痛不变或呈进行性加重
      status: active

  # =========================
  # 4. Step 层（路径）
  # =========================

  steps:
    - id: S1
      description: "机制/部位初判：把疼痛缩小到‘最可能的1–2个结构 + 触发窗口’，并建立可重复的自测"
      supports_hypothesis: H1
      done_if: >
        已完成一份“疼痛地图 + 触发动作清单 + 2–3个可重复自测”，
        且能回答：
        1) 主要痛点是否在髌骨下缘/髌韧带区域（点状/条索样）
        2) 哪些窗口最易触发（例如 0–30°伸膝、下楼、踮脚、深蹲末端等）
        3) 哪些窗口相对安全（可作为训练加载窗口）
      output: "S1_疼痛地图与自测记录.md（位置图+触发清单+自测结果）"
      status: "active"  # todo | active | frozen | done
      decision_deadline: "2026-01-29"  # 最迟1周内冻结：先进入训练型干预，不在机制判断上无限停留

    - id: S2
      description: "训练计划v1：基于‘安全窗口’重构下肢训练，并定义加载/回退/停止规则"
      supports_hypothesis: H1
      done_if: >
        已产出可执行的训练计划v1，包含：
        - ROM/角度限制（例如暂避低屈曲角高张力窗口）
        - 替代动作清单（同肌群、不同力学窗口）
        - 负荷进阶规则（每周如何+重量/组数/次数/ROM）
        - 回退规则（出现何种反应则降级：减少ROM/重量/总量）
        - Stop rule（出现何种信号当次训练立即停止并进入休整/医疗评估）
        - 反馈指标（用于S3跟踪）：训练中疼痛、24h反应、次日下楼/坐起反应等
      output: "S2_膝盖训练计划_v1.yaml（动作+ROM+加载规则+反馈指标）"
      status: "todo"  # todo | active | frozen | done
      decision_deadline: "2026-02-02"  # 最迟在下一次训练周期前冻结v1

    - id: S3
      description: "执行与反馈：按计划运行4–6周，判断趋势并决定‘继续/升级/推翻H1并切换H2’"
      supports_hypothesis: H1
      done_if: >
        在4–6周窗口内，满足以下之一即可冻结并进入下一阶段：
        A) 明显改善：主要触发动作的疼痛频率/强度下降，且训练可逐步加量
        B) 明显不改善或恶化：在严格控制负荷窗口下仍无改善/加重 → 视为H1被证伪，准备H2
      output: "S3_训练日志与趋势总结.md（每次训练记录+周趋势+结论）"
      status: "todo"  # todo | active | frozen | done
      decision_deadline: "2026-03-05"  # 约6周后必须给出趋势结论（继续/推翻H1/求医）

  # =========================
  # 5. Task 层（1 day 证据）
  # =========================

  tasks:
    # Task 的唯一职责：
    # - 一天内留下“可冻结的执行证据”
    # - 必须推进某个 Step
    # - status / done 字段用于记录现实进度，不参与成败裁决

    - id: T1
      supports_step: S1
      description: >
        最小必要知识：只为“膝前疼痛（髌骨下方）”建立够用的解剖与常见疼痛来源框架，
        目标是能做出‘剪枝’（哪些机制先不考虑）与‘动作窗口解释’（哪些角度更易触发）。
      output: "T1_膝前疼痛最小知识卡.md（结构清单+触发机制假设+剪枝结论）"
      done_if: >
        已完成1页以内的知识卡，包含：
        - 3–5个最相关结构（如：髌韧带/髌股关节/髌下脂肪垫/股四头肌腱/髂胫束外侧牵拉等，按你实际情况删减）
        - 每个结构对应的典型触发窗口（例如：低屈曲角伸膝末端、下楼、久坐起立、跳跃/蹲起等）
        - 一句话剪枝：明确“当前最不优先考虑的2–3个机制/结构”（例如半月板/ACL等，除非出现锁住/卡顿/明显不稳）
      due: "2026-01-23"
      timebox: "60-90min"
      status: "done"
      done: ""

    - id: T2
      supports_step: S1
      description: >
        从大到小的检测方案：把‘疼痛位置 + 触发动作 + 安全窗口’标准化，
        生成可重复的自测组合（2–3个）与记录表，作为后续训练计划v1的输入。
      output: >
        "T2_疼痛地图与自测方案.md（位置图+触发清单+自测表格模板）"
        "疼痛机制判断方案.md"
      done_if: >
        已完成并实际执行一次检测，产出：
        - 疼痛地图：用文字/简图标注最痛点（精确到髌骨下缘/髌韧带区域还是更偏内外侧）
        - 触发动作Top5：按可重复性排序（例如伸膝末端、下楼、踮脚、深蹲末端等）
        - 安全窗口Top3：明确“当前可加载”的动作/角度（例如限定ROM、改为等长、改为中等屈曲角等）
        - 自测组合（2–3个）：每个自测写清‘动作描述 + ROM/次数 + 疼痛评分（0–10） + 24h反应记录位’
      due: "2026-01-24"
      timebox: "45-60min"
      status: "todo"
      done: ""

  # =========================
  # 6. Procedure（Task 内部执行引导，可选）
  # =========================

  procedure:
    - id: P1
      supports_task: T2
      focus: "理解如何进行测试，以及测试结果可能的含义"
      done_if: "重新阅读完成一遍检测方案"
      artifacts: []
      record: ""           # 记录关键决策、偏差或当时的真实判断（作为事后回溯证据）
      status: "active"           # todo | done，Procedure 是否已执行完成
    - id: P2
      supports_task: T2
      focus: "进行测试"
      done_if: "完成一次测试，获得测试结果"
      artifacts: [填写完成的测试方案.pdf]
      record: ""           # 记录关键决策、偏差或当时的真实判断（作为事后回溯证据）
      status: "active"           # todo | done，Procedure 是否已执行完成