
meta:
  name: 认知积累系统
  purpose: >
    利用碎片时间进行发散性输入，
    为 PHST / Execution 提供材料、视角与灵感。
  rule:
    - 不进入主任务池
    - 不设deadline
    - 不强制完成
    - 允许长期存在
  minimal_existence:
    - 每周至少出现2次发散输入
    - 若连续两周为0，则触发review

domains:
  - id: d1
    name: 科研
    direction: >
      扩展理论视野，增加方法论与跨领域理解。
  - id: d2
    name: 健身
    direction: >
      扩展训练理论与恢复认知，建立更高层结构理解。
  - id: d3
    name: 三观
    direction: >
      扩展历史认知、价值判断能力与人生结构理解。
      
tasks:
  - id: s1
    domains_id: [d1]
    description: 浏览非核心领域论文
    medium: 论文
    energy: medium

  - id: s2
    domains_id: [d1]
    description: 观看学术讲座/报告
    medium: 视频
    energy: low

  - id: s3
    domains_id: [d1]
    description: 阅读方法学或综述类文章
    medium: 书籍/论文
    energy: medium

  - id: s4
    domains_id: [d2]
    description: 阅读训练理论文章
    medium: 文章
    energy: medium

  - id: s5
