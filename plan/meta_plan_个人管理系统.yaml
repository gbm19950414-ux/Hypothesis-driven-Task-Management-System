# =========================
# 0. 元认知注释（只读）
# =========================

# 量级判断问题：
# - Plan：是否值得投入一段人生时间（错了要尽快止损）
# - Hypothesis：因果判断是否成立（是否允许被证伪）
# - Step：路径是否可行（允许绕路 / 替换）
# - Task：今天是否留下证据（错了也没关系）

# philosophy 决定“成败由谁裁决”
# 只能选一个作为主导，其余降级为辅助
philosophy: evidence
status: suspend
# =========================
# 1. 目标与现状
# =========================

desired_state:
  statement: "建立一套可运行、可维护、可演化的个人管理系统，使日常决策与任务执行更高效、稳定"           # 期望的“不同于现在”的状态（可模糊，但要有方向性）

  time_window: "rolling / ongoing（运行态治理；滚动验收，不设终点）"
  observable_change: >
    在任意连续 4 周内：
    ① 每周一次 Weekly Review，单次 ≤ 90min；
    ② ≥70% 的工作日可在 60 秒内选出首任务并启动 timebox；
    ③ ≥3 个领域（科研/训练/生活）各有 ≥1 个活跃项目，且每周至少各产生 1 个可冻结输出；
    ④ 系统维护时间占可用时间 ≤ 25%。
current_state:
  hard_constraints: >
    时间：工作日 20–40min/天；每周 60–90min 维护。
    载体：Mac + VSCode + YAML/Markdown。
    现实约束：任务受地点/精力/身体状态影响。
  failure_mode: >
    系统变成记录负担而非决策引擎（字段膨胀、更新震荡、任务堆积）。
  uncertainty: >
    MVP 的最小字段集边界；日捕获与周整合的最佳节律；多项目并行是否需要更强的冻结/优先级机制。
# =========================
# 2. 校验与约束
# =========================

validation:
  earliest_signal: "7 天内 ≥5 天能在 60 秒内选出首任务并完成 1 个 timebox；第一次 Weekly Review ≤ 90min。"
  stop_rule: "滚动治理而非一次性完成：若任意连续 4 周出现任一项——a) Weekly Review 平均 >120min；b) 维护时间 >40%；c) 连续 ≥2 周无法在 60 秒内选出首任务；d) 活跃项目中 ≥50% 连续两周无可冻结输出——则冻结新增模块→删减字段→回退到 MVP（仅 Steps+Tasks+due）直至指标恢复。"
constraints:
  deadline_or_budget: "里程碑：MVP 2026-03-08；稳定化 2026-04-05；之后进入滚动治理（每 4 周一次健康度验收），不设终止日期"
  fallback_rule: "freeze_output_and_reallocate_time"

# =========================
# 3. 假设层（≤ 3）
# =========================

hypotheses:
  - id: H1
    action: "建立“要做什么”系统，能根据目前情况选择计划哲学、生成器，建立plan，生产task list"
    expected_effect: "减少灵感丢失与系统震荡：日常不被新想法劫持，但每周能把高价值想法转化为可执行任务"
    time_to_observe: "2026-03-08"
    falsified_if: "连续 2 周 Weekly Review 后，Inbox 中 ≥60% 仍停留在‘想法’而无法转化为任务；或 Weekly Review 平均>120min"
    status: "active"

  - id: H2
    action: "建立“能做什么”系统，可以快速日决策当前工作"
    expected_effect: "每天在低波动状态下仍能稳定推进：更少‘不知道做什么’，更少硬顶高认知导致的低效"
    time_to_observe: "2026-03-22"
    falsified_if: "连续 7 天中 ≥3 天出现‘无法在 60 秒内选出首任务’，或实际执行与标签选择无明显相关（主观评估：选择后仍频繁卡死）"
    status: "todo"


# =========================
# 4. Step 层（路径）
# =========================

steps:
  - id: S_run
    description: "系统运行态治理：Weekly Review 中的结构维护（新建/拆分/合并 Plan，冻结/归档项目）"
    supports_hypothesis: H1
    done_if: "系统能在不增加维护负担的情况下，持续吸收新项目并保持活跃项目数量稳定"
    output: "每周 review 中有明确的结构调整记录（如新 plan / 冻结 plan / 合并 plan）"

  - id: S1
    description: "定义 PPMS v1 的最小结构与目录：计划文件（yaml）+ Inbox + Weekly Review 模板 + 当周任务池"
    supports_hypothesis: H1
    done_if: "所有模块可在本地用 VSCode 打开并按模板填写；新想法有唯一入口（Inbox）"
    output: "life_os/ 目录结构 + 3 个模板文件（inbox.md, weekly_review.md, project_template.yaml）"
    decision_deadline: "2026-02-23"

  - id: S2
    description: "固化‘日常捕获 / 周更整合’流程（第一次完整跑通 Weekly Review）"
    supports_hypothesis: H1
    done_if: "完成 1 次 Weekly Review；Inbox 至少 10 条；从中产出 ≥5 个可执行 Tasks"
    output: "weekly_review_2026-W08.md（或同等记录）+ 当周任务列表"
    decision_deadline: "2026-03-01"

  - id: S3
    description: "在任务层加入最小标签与日决策规则，并在 7 天内验证可用性"
    supports_hypothesis: H2
    done_if: "连续 7 天记录‘首任务选择’；其中 ≥5 天在 60 秒内完成选择并开始执行"
    output: "daily_pick_log_2026-02-..md（或表格）+ 更新后的 task 字段规范"
    decision_deadline: "2026-03-22"



# =========================
# 5. Task 层（1 day 证据）
# =========================

tasks:
  - id: T1
    supports_step: S1
    description: "在 life_os 中创建/确认目录结构与 3 个模板文件（inbox.md, weekly_review.md, project_template.yaml）"
    output: "目录与模板文件已存在（可打开、可填写）"
    done_if: "3 个模板文件都能被填写且不报 YAML/Markdown 格式问题"
    due: "2026-02-18"
    timebox: "2h"
    status: "done"
    done: ""

  - id: T2
    supports_step: S2
    description: "为日常灵感捕获设定规则：入口唯一（Inbox）、格式最小、日常不改结构"
    output: "inbox.md 顶部写入规则 + 记录至少 5 条灵感"
    done_if: "规则写清楚且当天完成 5 条捕获（每条含触发场景/可能影响）"
    due: "2026-02-19"
    timebox: "20min"
    status: "done"
    done: ""

  - id: T3a
    supports_step: S2
    description: "Weekly Review - 收集与筛选：从 Mac 备忘录挑出本周需要处理的条目，复制到 inbox（处理缓冲区）并做最小归类"
    output: "inbox（处理缓冲区）新增本周条目（≥10）且每条含：触发场景/想法/可能影响"
    done_if: "inbox 中 ≥10 条；每条至少有‘可能影响（对应哪个 plan/系统/决策）’"
    due: "2026-02-22"
    timebox: "20min"
    status: "done"
    done: ""

  - id: T3b
    supports_step: S2
    description: "Weekly Review - 更新 Plan：用 inbox 条目更新受影响的 1–3 个活跃 plan（补/改 hypotheses、steps、或新增/删除 tasks）"
    output: "1–3 个 plan 文件已更新（有具体改动痕迹）"
    done_if: "至少 1 个 plan 的 steps 或 tasks 有新增/删减/重排；并在 plan 或 review 里写明‘为何调整’一句话"
    due: "2026-02-22"
    timebox: "45min"
    status: "done"
    record: >
      接下来要跟新各个计划生产层逻辑，不仅是inbox，还要考虑目前的进展，逐一完成
    done: ""

  - id: T3c
    supports_step: S2
    description: "Weekly Review - 派生本周任务：从更新后的各 plan 中抽取本周 3–7 个关键 tasks（可执行、可冻结证据），写入 weekly_review"
    output: "weekly_review_YYYY-MM-DD.md + 本周关键任务清单（3–7 个）"
    done_if: "清单中每个 task 都有：明确 output + timebox；并写出‘本周不做清单’"
    due: "2026-02-22"
    timebox: "30min"
    status: done
    done: ""
    
  - id: T4
    supports_step: S3
    description: "目前已完成“什么需要做”部分系统，现在需要建立任务选择系统概念，完成“什么可以做”系统"
    output: "task_schema.md（或在本 yaml 的注释中写清字段）+ 已打标签的任务清单"
    done_if: "≥15 条任务完成标签；你能在 60 秒内从中选出当日首任务"
    due: "2026-02-24"
    timebox: "45min"
    status: done
    done: ""

  - id: T5
    supports_step: S3
    description: "连续 7 天记录‘首任务选择’与实际执行结果（是否顺利、是否需要降级任务）"
    output: "daily_pick_log（7 条记录）"
    done_if: "7 条记录完成；并写出 3 条最常见失败模式与对应调整"
    due: "2026-03-03~2026-03-09"
    timebox: "10min/day"
    status: "todo"
    done: ""
