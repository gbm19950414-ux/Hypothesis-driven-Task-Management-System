plan:
  # =========================
  # 0. 元认知注释（只读）
  # =========================

  # 量级判断问题：
  # - Plan：是否值得投入一段人生时间（错了要尽快止损）
  # - Hypothesis：因果判断是否成立（是否允许被证伪）
  # - Step：路径是否可行（允许绕路 / 替换）
  # - Task：今天是否留下证据（错了也没关系）

  # =========================
  # 1. 假设层（≤ 3）
  # =========================

  hypotheses:
    - id: H1
      action: ""
      expected_effect: ""
      time_to_observe: ""  # YYYY-MM-DD
      falsified_if: ""
      status: ""           # todo | active | frozen | done，用于标记该假设在当前时间窗口内的执行状态

  # =========================
  # 2. Step 层（路径）
  # =========================

  steps:
    - id: S1
      description: ""
      supports_hypothesis: H1
      done_if: ""          # 达到即可冻结
      output: ""
      status: ""           # todo | active | frozen | done，标记该路径当前是否仍在推进、已冻结或已完成
      decision_deadline: "" # 在 constraint 主导下，最迟必须对该 Step 做出冻结或继续决策的时间点

  # =========================
  # 3. Task 层（1 day 证据）
  # =========================

  tasks:
    # Task 的唯一职责：
    # - 一天内留下“可冻结的执行证据”
    # - 必须推进某个 Step
    # - status / done 字段用于记录现实进度，不参与成败裁决

    - id: T1
      supports_step: S1
      description: ""
      output: ""
      done_if: ""
      due: ""              # today / YYYY-MM-DD / YYYY-MM-DD~YYYY-MM-DD
      timebox: ""          # 2h / 4h / 1day（仅防膨胀）
      status: ""           # todo | active | blocked | done | dropped，细粒度执行状态，用于反映现实进度
      done: ""             # 实际完成日期（YYYY-MM-DD），与 due 解耦

