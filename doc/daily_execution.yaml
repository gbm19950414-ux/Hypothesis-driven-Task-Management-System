version: "1.0"
scope: "daily_execution_logic"

meta:
  purpose: >
    在多计划并行、精力受限、存在硬截止期的情况下，
    用最小认知负担决定“今天如何行动”。
  non_goals:
    - 任务排期
    - 每日记录
    - 精细时间管理

# =========================
# 核心总原则（只此一条）
# =========================

core_principle: >
  在合适的精力窗口，
  推进当前最不能失败的计划，
  并冻结一个不可逆的进展。

# =========================
# 决策顺序（不可打乱）
# =========================

decision_order:
  - name: plan_risk
    question: "如果今天什么都不做，哪个计划的失败代价最高？"
    rule: "每天只选一个 primary plan，其余自动降级"

  - name: energy_window
    question: "今天哪一段时间判断力最好？"
    rule: "最好的精力只服务 primary plan"

  - name: freeze_action
    question: "今天能冻结什么，让明天不用重新判断？"
    rule: "只求冻结，不求完美完成"

# 紧急事件（如任务滞后）不参与 daily 决策排序；
# 它只作为信号，用于判断是否触发 compression_mode。
# 一旦触发 compression_mode，停止讨论“今天优先做什么”，
# 转而裁决“哪些事不再值得被做”，切掉一切非必要的事情
# 然后裁决“最小交付路径”，用最快的速度追上进度
# 原则是：在 deadline 不变的前提下，确保“最小可交付结果”仍然能被交付。

# =========================
# 精力使用原则
# =========================

energy_principles:
  high_energy:
    allowed:
      - 不可逆决策
      - 核心推理与写作
      - 关键 task（primary plan）
    forbidden:
      - 次要计划
      - 机械执行
      - 无明确产出的思考

  low_energy:
    allowed:
      - 执行型任务
      - SOP / 整理 / 跑脚本
    forbidden:
      - 关键判断
      - 结构性修改

# =========================
# 落后时的应对逻辑（压缩模式）
# =========================

compression_mode:
  trigger: "任务明显落后且 deadline 不变"
  rules:
    - "停止维护 task 的具体日期"
    - "重新裁决哪些 task 值得被完成"
    - "优先保证最小可交付结果"
    - "删除/合并/降级 task，而不是延期"

# =========================
# 明确禁止的行为（系统红线）
# =========================

anti_patterns:
  - "用疲劳时间做高判断任务"
  - "为了不焦虑而重排所有时间"
  - "在低精力时做结构性决策"
  - "为所有计划平均分配注意力"
  - "用记录本身替代推进"

# =========================
# 更新规则
# =========================

maintenance:
  update_when:
    - "发现自己反复违背某一原则"
    - "现实约束发生长期变化（工作强度/精力结构）"
  update_rule: "只改原则，不加字段"