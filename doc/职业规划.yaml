现状:
  近两年中国创新药审批提速、医药产业数智化推进，使 产业研发、转化、计算、医学事务 这些分支的重要性都在上升。
  2025 年上半年我国批准创新药 43 个，同比增长 59%；
  同时，六部门联合印发《医药工业数智化转型实施方案（2025—2030年）》，明确推动医药研发和生产的数字化、智能化。
中国生物博士完整职业地图（industry topology）:
  中国生物博士
  │
  ├─ A. 学术轨道
  │   ├─ 博士后
  │   ├─ 高校教师 / 科研岗
  │   ├─ 研究所科研岗
  │   └─ PI / 课题组长
  │
  ├─ B. 产业研发轨道
  │   ├─ 药企研发（Big Pharma / 本土大药企）
  │   ├─ Biotech 创新药公司
  │   ├─ CRO / CDMO / 技术服务        研究自主性较低，工作更偏交付和效率
  │   ├─ 转化医学 / 临床前-临床接口
  │   ├─ 计算生物 / 生信 / AI+Bio
  │   └─ 平台型研发（抗体、蛋白、细胞治疗、组学、筛选平台）
  │
  ├─ C. 产业非研发轨道
  │   ├─ 医学事务 / MSL
  │   ├─ 医学写作 / 医学传播
  │   ├─ 注册 / 合规 / 药政
  │   ├─ 产品经理 / 市场 / 战略
  │   ├─ 咨询
  │   └─ 投资 / 行研 / BD
  │
  └─ D. 公共与支撑轨道
      ├─ 公务员 / 事业单位
      ├─ 医院科研管理 / 临床研究管理
      ├─ 科技管理 / 基金 / 园区 / 孵化器
      ├─ 出版 / 编辑 / 科学传播
      └─ 仪器 / 试剂 / 平台支持
