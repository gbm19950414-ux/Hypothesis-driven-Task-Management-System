      中国创新药研发活跃度持续上升，在研创新药和临床试验数量保持全球前列，意味着 发现研究、转化、临床接口 这几层会持续存在岗位需求；
      与此同时，政策层面明确推进医药工业数智化，所以 生信、计算、自动化、数据化平台 这一枝不会只是“附属技能”，而是在变成主干分支。
学术岗位: >
  这条路的本质不是“先找份工作”，而是 继续押注独立科研资格。
  优点是研究自由度、学术身份、长期上限高；缺点是路径长、竞争强、对论文/基金依赖极高。
  所以它更像是：继续参加下一轮筛选，而不是立即落地一个稳定职业。
药企大型pharma研发: >
  •	还想做研究
  •	但不想把职业命运高度绑定在论文和帽子项目上
  •	接受项目导向而非纯兴趣导向

  这里最常见的入口是：
    •	靶点与机制
    •	体内外药效
    •	抗体/蛋白/细胞治疗平台
    •	转化医学
    •	生信与多组学支持
5个分叉问题:
  Q1 我要不要继续押注“独立学术身份”？
      ├─ 要 → 学术轨道
      └─ 不一定 → 往产业看

  Q2 我是否还想把“做研究”作为主工作？
      ├─ 是 → 产业研发
      └─ 否 → 非研发/公共岗位

  Q3 我更想做哪种研究？
      ├─ 机制/发现 → pharma/biotech discovery
      ├─ 交付/流程 → CRO/CDMO
      ├─ 临床接口 → translational / medical
      └─ 数据/算法 → comp bio / bioinfo

  Q4 我更看重什么？
      ├─ 稳定 → 大药企 / 公共部门 / 医学事务 / 注册
      ├─ 快速成长 → biotech / 咨询 / BD
      └─ 技能复用性 → comp bio / MSL / 战略

  Q5 我是否接受高不确定性换更高上限？
      ├─ 接受 → startup / 创新药 biotech / 投资
      └─ 不接受 → big pharma / CRO / 公共体系